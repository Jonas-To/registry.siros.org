# sources.yaml — registry.siros.org site instance
# Declares which repositories provide credential schemas.
#
# Meta-sources auto-discover repos by GitHub topic.
# Explicit sources (git:<url>) override any meta-source entry for the same repo.
# Auto-discovered repos use each repo's default branch.

sources:
  # Auto-discover all repos tagged "vctm" across GitHub
  - "github:topic/vctm"

  # Explicit entries (these repos keep credential data on the vctm branch)
  - url: "git:https://github.com/sirosfoundation/demo-credentials.git"
    branch: vctm
  - url: "git:https://github.com/leifj/vctm-template.git"
    branch: vctm
